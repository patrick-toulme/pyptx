site_name: pyptx
site_url: https://pyptx.dev
site_description: Python DSL for writing PTX kernels, callable from jax.jit and torch.compile
repo_url: https://github.com/patrick-toulme/pyptx
repo_name: patrick-toulme/pyptx

theme:
  name: material
  logo: assets/pyptx-wordmark.png
  favicon: assets/pyptx-icon-128.png
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - pyptx:
      - Home: index.md
      - How It Works: how-it-works.md
      - Performance: performance.md
      - vs Triton/CUTLASS/Pallas: comparison.md
      - Philosophy: philosophy.md
      - Install: install.md
      - Getting Started: getting-started.md
      - Transpiler: transpiler.md
  - API Reference: api/index.md
  - Examples: examples/index.md
  - Runtime:
      - JAX: runtime/jax.md
      - Torch: runtime/torch.md
      - torch.compile: runtime/torch-compile.md
  - Guides:
      - First Kernel: guides/first-kernel.md
      - PTX Namespace: guides/ptx-namespace.md
      - Shared Memory: guides/smem.md
      - Tiles, Layouts, and TMA: guides/tiles-layouts-tma.md
      - Mbarriers and Async Sync: guides/mbarriers.md
      - Fragment Layouts: guides/fragment-layouts.md
      - RMS Norm: guides/rms-norm.md
      - SwiGLU: guides/swiglu.md
      - Hopper GEMM: guides/handwritten-gemm.md
      - Grouped GEMM: guides/grouped-gemm.md
      - Blackwell GEMM: guides/blackwell-gemm.md
      - Ampere (A100) and arch="auto": guides/ampere.md
      - Debugging: guides/debugging.md

plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#001030"
        color: "#ffffff"
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            heading_level: 2
            members_order: source
            separate_signature: true
            show_root_heading: true
            show_root_toc_entry: false
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - assets/extra.css
