name: Generate Docs

on:
  push:
    # Only auto-regenerate on dev pushes. main is the public release
    # branch and stays as a single clean "Initial release of pyptx"
    # commit by Patrick alone — bot auto-commits would break that.
    # Auto-generated docs on dev are current before any dev → main
    # release flow, so main never falls behind.
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: "Regenerate API and example docs"
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -e ".[docs]"

      - name: Regenerate generated docs
        run: python docs/scripts/generate_docs.py

      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/api docs/examples
          git diff --cached --quiet && exit 0
          git commit -m "Update generated docs [skip ci]"
          git push
